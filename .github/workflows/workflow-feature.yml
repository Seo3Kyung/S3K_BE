name: Build And Test feature branches
on:
  push:
    branches: [ feature/*, bugfix/* ]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: St up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Create secret.yml
        run: |
          mkdir -p src/main/resources
          echo "${{secrets.SECRET_YML}}" | base64 --decode > src/main/resources/application-secret.yml

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Clean and Build
        run: ./gradlew clean build -x test

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: build/libs

      - name: Notify Discord on build failure
        uses: appleboy/discord-action@v1.2.0
        with:
          webhook_id: ${{secrets.DISCORD_WEBHOOK_ID}}
          webhook_token: ${{secrets.DISCORD_WEBHOOK_TOKEN}}
          color: "#00FF00"
          message: ":x: 빌드 실패: ${{github.event.repository.full_name}} - ${{github.sha}}"
        if: failure()