name: Deploy to EC2
on:
  push:
    branches: [ feature/* ]
  pull_request:
    branches: [ prod ]
    types: [ closed ]

env:
  DOCKER_IMAGE_NAME: s3k/prod:latest

jobs:
  build:
    if: ${{ github.event_name == 'push' || github.event.pull_request.merged == true}}
    runs-on: ubuntu-latest
    environment: prod

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew clean build -x test

    - name: Notify Discord on build success
      uses: appleboy/discord-action@v1.2.0
      with:
        webhook_id: ${{ secrets.DISCORD_WEBHOOK_ID }}
        webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
        color: "#7FFF00"
        message: ":white_check_mark: 빌드 성공: ${{ github.event.repository.full_name }} - ${{ github.sha }}"
      if: success()

    - name: Notify Discord on build failure
      uses: appleboy/discord-action@v1.2.0
      with:
        webhook_id: ${{ secrets.DISCORD_WEBHOOK_ID }}
        webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
        color: "#00FF00"
        message: ":x: 빌드 실패: ${{github.event.repository.full_name}} - ${{github.sha}}"
      if: failure()

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{env.DOCKER_IMAGE_NAME}}

      - name: Notify Discord on build success
        uses: appleboy/discord-action@v1.2.0
        with:
          webhook_id: ${{ secrets.DISCORD_WEBHOOK_ID }}
          webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
          color: "#7FFF00"
          message: ":whale: 도커 이미지 푸쉬 성공: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:${{ github.sha }}"
        if: success()

      - name: Notify Discord on build failure
        uses: appleboy/discord-action@v1.2.0
        with:
          webhook_id: ${{ secrets.DISCORD_WEBHOOK_ID }}
          webhook_token: ${{ secrets.DISCORD_WEBHOOK_TOKEN }}
          color: "#00FF00"
          message: ":x: 도커 이미지 푸쉬 실패: ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}:${{ github.sha }}"
        if: failure()