name: Deploy to EC2
on:
  pull_request:
    branches: [ dev ]
    types: [ closed ]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: dev
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Create application-secret.yml
      run: |
        mkdir -p src/main/resources
        echo "${{secrets.SECRET_YML}}" | base64 --decode > src/main/resources/application-secret.yml

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew clean build -x test

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: jar-artifact
        path: build/libs

  docker:
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: jar-artifact
          path: build/libs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN}}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{secrets.DOCKERHUB_USERNAME}}/s3k-dev:latest

      - name: Notify Discord on build failure
        uses: appleboy/discord-action@v1.2.0
        with:
          webhook_id: ${{secrets.DISCORD_WEBHOOK_ID}}
          webhook_token: ${{secrets.DISCORD_WEBHOOK_TOKEN}}
          color: "#00FF00"
          message: ":x: 도커 이미지 푸쉬 실패: ${{secrets.DOCKERHUB_USERNAME}}/${{github.event.repository.name}}:${{github.sha}}"
        if: failure()

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: SSH and Update Docker Image on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{secrets.EC2_HOST}}
          username: ${{secrets.EC2_USERNAME}}
          key: ${{secrets.EC2_PRIVATE_KEY}}
          port: ${{secrets.EC2_PORT || 22}}
          script: |
            docker pull ${{secrets.DOCKERHUB_USERNAME}}/s3k-dev:latest
            docker stop ${{secrets.EC2_CONTAINER_NAME}}
            docker rm ${{secrets.EC2_CONTAINER_NAME}}
            docker run -d --name ${{secrets.EC2_CONTAINER_NAME}} -p ${{secrets.EC2_PORT_FORWARDING}} -e SPRING_PROFILES_ACTIVE=dev ${{secrets.DOCKERHUB_USERNAME}}/s3k-dev:latest
            docker image prune -af

      - name: Notify Discord on deploy failure
        uses: appleboy/discord-action@v1.2.0
        with:
          webhook_id: ${{secrets.DISCORD_WEBHOOK_ID}}
          webhook_token: ${{secrets.DISCORD_WEBHOOK_TOKEN}}
          color: "FF0000"
          message: ":x: EC2 배포 실패: ${{secrets.EC2_HOST}}"
        if: failure()
