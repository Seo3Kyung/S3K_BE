---
server:
  port: 9999

spring:
  profiles:
    active: local
  config:
    import: classpath:application-secret.yml
  cloud:
    aws:
      credentials:
        access-key: ${aws.s3.access-key}
        secret-key: ${aws.s3.secret-key}
      region:
        static: ${aws.s3.region}
      s3:
        bucket: ${aws.s3.bucket-name}
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${kakao.client-id}
            client-secret: ${kakao.client-secret}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - openid
            provider: kakao
          google:
            client-id: ${google.client-id}
            client-secret: ${google.client-secret}
            scope:
              - openid
          naver:
            client-id: ${naver.client-id}
            client-secret: ${naver.client-secret}
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - openid
            provider: naver
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            jwk-set-uri: https://kauth.kakao.com/.well-known/jwks.json
          naver:
            authorization-uri: https://nid.naver.com/oauth2/authorize
            token-uri: https://nid.naver.com/oauth2/token
            jwk-set-uri: https://nid.naver.com/oauth2/jwks
            user-info-uri: https://openapi.naver.com/v1/nid/me
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

app:
  storage:
    type: local
    local:
      base-dir: ./uploads/profile-images

jwt:
  secret:
    key: { jwt.secret.key }

springdoc:
  swagger-ui:
    path: /api/swagger
    groups-order: DESC
    tags-sorter: alpha
    operations-sorter: method
    disable-swagger-default-url: true
    display-request-duration: true
    doc-expansion: none
  api-docs:
    enabled: true
  use-fqn: true
  show-actuator: false
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
  writer-with-default-pretty-printer: true
  override-with-generic-response: false
  paths-to-match:
    - /**
...