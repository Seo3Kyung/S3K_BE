---
spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://localhost:5432/local
    driver-class-name: org.postgresql.Driver
    username: user
    password:
  security:
    oauth2:
      client:
        registration:
          kakao:
            redirect-uri: "http://localhost:9999/login/oauth2/code/kakao"
          google:
            redirect-uri: "http://localhost:9999/login/oauth2/code/google"
          naver:
            redirect-uri: "http://localhost:9999/login/oauth2/code/naver"

  # 혹시나 해서 살려둠
  mybatis:
    mapper-locations: classpath:mapper/**/*.xml
    type-aliases-package: com.s3k.backend
...
