---
spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://${dev.datasource.dockerHost}:5432/s3k
    driver-class-name: org.postgresql.Driver
    username: ${dev.datasource.usernames}
    password: ${dev.datasource.password}
  security:
    oauth2:
      client:
        registration:
          kakao:
            redirect-uri: ${kakao.redirect-uri}
          google:
            redirect-uri: ${google.redirect-uri}
          naver:
            redirect-uri: ${naver.redirect-uri}

logging:
  level:
    root: info
  discord:
    webhook-url: ${dev.discord.webhook-url}
...
